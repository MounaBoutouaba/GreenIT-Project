<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Green IT - Quiz</title>
</head>
<body>
    <header>
        <h1>Testez vos connaissances sur le Green IT</h1>
        <nav>
            <ul>
                <li><a href="home.html">Accueil</a></li>
                <li><a href="GreenITSiteWeb.html">Green IT Web</a></li>
                <li><a href="QuizGreenIT.html">Quiz</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Quiz Green IT</h2>
            
            <form action="#" method="get">
                
                <fieldset>
                    <legend>1. Qu'est-ce que le Green IT ?</legend>
                    <input type="radio" id="q1a" name="q1" value="a">
                    <label for="q1a">a) Une pratique visant à réduire l'impact environnemental des technologies</label><br>
                    
                    <input type="radio" id="q1b" name="q1" value="b">
                    <label for="q1b">b) Un système de recyclage de vieux ordinateurs</label><br>
                    
                    <input type="radio" id="q1c" name="q1" value="c">
                    <label for="q1c">c) Une méthode pour augmenter la consommation des serveurs</label>
                </fieldset>
                <br>

                <fieldset>
                    <legend>2. Quel est l'objectif principal du Green IT ? (Plusieurs réponses possibles)</legend>
                    <input type="checkbox" id="q2a" name="q2a" value="a">
                    <label for="q2a">a) Réduire la consommation d'énergie</label><br>
                    
                    <input type="checkbox" id="q2b" name="q2b" value="b">
                    <label for="q2b">b) Minimiser les déchets électroniques</label><br>
                    
                    <input type="checkbox" id="q2c" name="q2c" value="c">
                    <label for="q2c">c) Optimiser les performances des appareils peu importe le coût énergétique</label>
                </fieldset>
                <br>

                <fieldset>
                    <legend>3. Donnez un exemple de pratique Green IT :</legend>
                    <input type="text" id="q3" name="q3" placeholder="Votre réponse ici..." style="width: 300px;">
                </fieldset>
                <br>

                <input type="button" value="Soumettre le Quiz">
            </form>
        </section>
    </main>

    <footer>
        <p>Projet Green IT - Créé pour le Lab 01</p>
    </footer>
</body>
</html>
